<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ours ♡</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Caveat:wght@400;500;600&family=Qwigley&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            color: #ffffff;
            padding: 20px;
            user-select: none;
            overflow-x: hidden;
            transition: background 0.4s ease, color 0.4s ease;
        }

        body::before {
            content: '';
            position: fixed;
            top: -200px;
            left: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(59,130,246,0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body::after {
            content: '';
            position: fixed;
            bottom: -200px;
            right: -200px;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99,102,241,0.1) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }

        body.light {
            background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 30%, #e2e8f0 70%, #f8fafc 100%);
            color: #334155;
        }

        body.light::before { background: radial-gradient(circle, rgba(59,130,246,0.08) 0%, transparent 70%); }
        body.light::after { background: radial-gradient(circle, rgba(99,102,241,0.06) 0%, transparent 70%); }

        .container {
            max-width: 700px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
        }

        .header {
            text-align: center;
            padding: 40px 0 10px;
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
            font-family: 'Poppins', sans-serif;
            transition: color 0.4s ease;
        }

        body.light .header h1 { color: #1e293b; }

        .header h1 span {
            background: linear-gradient(135deg, #60a5fa, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header p {
            color: #475569;
            font-size: 1.4em;
            margin-top: 6px;
            letter-spacing: 1px;
            font-family: 'Qwigley', cursive;
            transition: color 0.4s ease;
        }

        body.light .header p { color: #64748b; }

        .sync-status {
            text-align: center;
            font-size: 0.72em;
            color: #475569;
            margin-top: 8px;
            letter-spacing: 0.5px;
            font-family: 'Poppins', sans-serif;
        }

        body.light .sync-status { color: #94a3b8; }

        .sync-status .dot {
            display: inline-block;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            margin-right: 5px;
            vertical-align: middle;
        }

        .dot.online { background: #60a5fa; box-shadow: 0 0 12px rgba(59,130,246,1), 0 0 20px rgba(59,130,246,0.6); }
        .dot.offline { background: #475569; }

        /* ===================== TABS ===================== */
        .tabs {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin: 30px 0;
        }

        .tab {
            padding: 9px 18px;
            border-radius: 50px;
            border: 1px solid rgba(255,255,255,0.06);
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 0.8em;
            font-weight: 500;
            transition: all 0.3s ease;
            background: rgba(255,255,255,0.03);
            color: #cbd5e1;
            backdrop-filter: blur(10px);
            letter-spacing: 0.3px;
            position: relative;
        }

        body.light .tab {
            border-color: rgba(100,116,139,0.15);
            background: rgba(255,255,255,0.6);
            color: #64748b;
        }

        .tab:hover {
            background: rgba(59,130,246,0.08);
            color: #ffffff;
            border-color: rgba(59,130,246,0.2);
        }

        body.light .tab:hover { color: #1e293b; background: rgba(59,130,246,0.06); }

        .tab.active {
            background: rgba(59,130,246,0.18);
            color: #ffffff;
            border-color: rgba(59,130,246,0.5);
            box-shadow: 0 0 25px rgba(59,130,246,0.35), 0 0 50px rgba(59,130,246,0.15);
        }

        body.light .tab.active {
            color: #1e293b;
            background: rgba(59,130,246,0.1);
            box-shadow: 0 0 15px rgba(59,130,246,0.2);
        }

        .badge {
            position: absolute;
            top: -7px;
            right: -7px;
            min-width: 18px;
            height: 18px;
            border-radius: 50px;
            background: rgba(15,23,42,0.9);
            border: 1.5px solid rgba(59,130,246,0.8);
            box-shadow: 0 0 10px rgba(59,130,246,0.9), 0 0 25px rgba(59,130,246,0.5);
            color: #ffffff;
            font-size: 0.6em;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 4px;
            animation: badgePulse 2s infinite;
            z-index: 10;
        }

        body.light .badge { background: rgba(255,255,255,0.95); color: #3b82f6; }

        @keyframes badgePulse {
            0%, 100% { box-shadow: 0 0 10px rgba(59,130,246,0.9), 0 0 25px rgba(59,130,246,0.5); }
            50% { box-shadow: 0 0 18px rgba(59,130,246,1), 0 0 40px rgba(59,130,246,0.7); }
        }

        .category-section { display: none; }
        .category-section.active { display: block; animation: fadeIn 0.4s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .section-header { text-align: center; margin-bottom: 24px; }

        .section-header h2 {
            font-size: 1.1em;
            color: #ffffff;
            font-weight: 500;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-family: 'Poppins', sans-serif;
            transition: color 0.4s ease;
        }

        body.light .section-header h2 { color: #334155; }

        .input-row { display: flex; gap: 10px; margin-bottom: 24px; }

        .input-row input {
            flex: 1;
            padding: 14px 20px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            background: rgba(255,255,255,0.04);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            outline: none;
            color: #ffffff;
        }

        body.light .input-row input {
            border-color: rgba(100,116,139,0.15);
            background: rgba(255,255,255,0.8);
            color: #334155;
        }

        .input-row input::placeholder { color: #334155; }
        body.light .input-row input::placeholder { color: #94a3b8; }

        .input-row input:focus {
            border-color: rgba(59,130,246,0.4);
            background: rgba(59,130,246,0.05);
            box-shadow: 0 0 0 3px rgba(59,130,246,0.08);
        }

        body.light .input-row input:focus { background: white; }

        .add-btn {
            padding: 14px 22px;
            background: rgba(59,130,246,0.15);
            color: #ffffff;
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 16px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            backdrop-filter: blur(10px);
        }

        body.light .add-btn { background: rgba(59,130,246,0.1); color: #1e40af; border-color: rgba(59,130,246,0.25); }

        .add-btn:hover {
            background: rgba(59,130,246,0.3);
            box-shadow: 0 0 30px rgba(59,130,246,0.45), 0 0 60px rgba(59,130,246,0.2);
            transform: translateY(-1px);
        }

        .add-btn:active { transform: scale(0.97); }

        .items-list { list-style: none; min-height: 50px; }

        .item {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 15px 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.06);
            cursor: grab;
        }

        body.light .item { background: rgba(255,255,255,0.75); border-color: rgba(255,255,255,0.9); }

        .item:hover {
            background: rgba(59,130,246,0.05);
            border-color: rgba(59,130,246,0.15);
            transform: translateX(4px);
        }

        body.light .item:hover { background: rgba(255,255,255,0.95); box-shadow: 0 4px 20px rgba(0,0,0,0.05); }

        .item.dragging { opacity: 0.4; transform: scale(0.98); cursor: grabbing; }
        .item.done { opacity: 0.35; }
        .item.done .item-text { text-decoration: line-through; color: #334155; }

        .check-btn {
            width: 22px; height: 22px; border-radius: 50%;
            border: 1px solid #334155; background: transparent;
            cursor: pointer; transition: all 0.3s ease;
            flex-shrink: 0; display: flex; align-items: center;
            justify-content: center; font-size: 11px; z-index: 2; color: transparent;
        }

        body.light .check-btn { border-color: #cbd5e1; }
        .check-btn:hover { border-color: #3b82f6; background: rgba(59,130,246,0.1); }

        .check-btn.checked {
            background: rgba(59,130,246,0.25); border-color: #60a5fa;
            color: #ffffff; box-shadow: 0 0 15px rgba(59,130,246,0.7), 0 0 30px rgba(59,130,246,0.3);
        }

        body.light .check-btn.checked { color: #1e40af; box-shadow: 0 0 10px rgba(59,130,246,0.3); }

        .item-text {
            flex: 1; font-size: 0.9em; word-break: break-word;
            cursor: text; user-select: text; color: #ffffff;
            font-family: 'Poppins', sans-serif; transition: color 0.4s ease;
        }

        body.light .item-text { color: #334155; }

        .item-meta {
            font-size: 0.7em; color: #475569; white-space: nowrap;
            pointer-events: none; font-family: 'Poppins', sans-serif;
        }

        body.light .item-meta { color: #94a3b8; }

        .delete-btn {
            background: none; border: none; color: #475569;
            cursor: pointer; font-size: 1.1em; padding: 4px;
            transition: all 0.3s ease; border-radius: 8px; z-index: 2;
        }

        body.light .delete-btn { color: #cbd5e1; }
        .delete-btn:hover { color: #60a5fa; background: rgba(59,130,246,0.1); }
        body.light .delete-btn:hover { color: #ef4444; background: rgba(239,68,68,0.1); }

        .clear-all { text-align: center; margin-top: 15px; }

        .clear-all button {
            background: none; border: none; color: #334155;
            font-size: 0.75em; cursor: pointer; text-decoration: underline;
            font-family: 'Poppins', sans-serif; letter-spacing: 0.3px;
        }

        body.light .clear-all button { color: #94a3b8; }
        .clear-all button:hover { color: #64748b; }

        .empty-state { text-align: center; padding: 50px 20px; }
        .empty-state .empty-emoji { font-size: 2.5em; margin-bottom: 10px; display: block; }
        .empty-state p { font-size: 0.85em; color: #334155; font-family: 'Poppins', sans-serif; }
        body.light .empty-state p { color: #94a3b8; }

        /* ===================== THEME TOGGLE ===================== */
        .theme-toggle {
            display: flex; align-items: center; justify-content: center;
            gap: 12px; margin-top: 40px; margin-bottom: 10px;
        }

        .theme-toggle span { font-size: 0.75em; color: #334155; }
        body.light .theme-toggle span { color: #94a3b8; }

        .toggle-switch {
            width: 52px; height: 28px;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            border-radius: 50px; cursor: pointer;
            position: relative; transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(59,130,246,0.25);
        }

        body.light .toggle-switch {
            background: rgba(100,116,139,0.1);
            border-color: rgba(100,116,139,0.2); box-shadow: none;
        }

        .toggle-switch::after {
            content: ''; position: absolute; width: 20px; height: 20px;
            border-radius: 50%; background: #3b82f6; top: 3px; left: 3px;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px rgba(59,130,246,0.8), 0 0 20px rgba(59,130,246,0.4);
        }

        body.light .toggle-switch::after { left: 27px; background: #64748b; box-shadow: none; }

        .footer {
            text-align: center; padding: 10px 20px 20px;
            color: #334155; font-size: 0.8em; letter-spacing: 1px;
            font-family: 'Poppins', sans-serif;
        }

        body.light .footer { color: #94a3b8; }

        .toast {
            position: fixed; bottom: 30px; left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: rgba(15,23,42,0.95);
            border: 1px solid rgba(59,130,246,0.3);
            color: #ffffff; padding: 11px 24px; border-radius: 50px;
            font-size: 0.85em; font-weight: 500;
            box-shadow: 0 8px 30px rgba(0,0,0,0.4);
            transition: transform 0.4s ease; z-index: 999;
            pointer-events: none; font-family: 'Poppins', sans-serif;
        }

        body.light .toast {
            background: rgba(255,255,255,0.95); color: #334155;
            border-color: rgba(100,116,139,0.2); box-shadow: 0 8px 30px rgba(0,0,0,0.1);
        }

        .toast.show { transform: translateX(-50%) translateY(0); }

        /* ===================== NOTES ===================== */
        .notes-section { display: none; min-height: 500px; }
        .notes-section.active { display: block; animation: fadeIn 0.4s ease; }

        .notes-board {
            position: relative; min-height: 520px; width: 100%;
            background: rgba(255,255,255,0.015); border-radius: 24px;
            border: 1px dashed rgba(255,255,255,0.06);
            margin-top: 20px; overflow: hidden;
        }

        body.light .notes-board { background: rgba(255,255,255,0.4); border-color: rgba(100,116,139,0.15); }

        .notes-board-hint {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%); text-align: center;
            color: #334155; pointer-events: none; font-size: 0.85em;
        }

        body.light .notes-board-hint { color: #94a3b8; }
        .notes-board-hint .hint-emoji { font-size: 2em; display: block; margin-bottom: 8px; }

        .add-note-btn {
            display: flex; align-items: center; gap: 10px;
            margin: 0 auto; padding: 13px 28px;
            background: rgba(59,130,246,0.1); color: #ffffff;
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 50px; font-family: 'Poppins', sans-serif;
            font-size: 0.9em; font-weight: 600; cursor: pointer;
            transition: all 0.3s ease; backdrop-filter: blur(10px);
        }

        body.light .add-note-btn { color: #1e40af; background: rgba(59,130,246,0.08); }

        .add-note-btn:hover {
            background: rgba(59,130,246,0.2);
            box-shadow: 0 0 30px rgba(59,130,246,0.4);
            transform: translateY(-2px);
        }

        .add-note-btn .plus { font-size: 1.3em; font-weight: 300; line-height: 1; }

        .sticker {
            position: absolute; width: 185px; min-height: 165px;
            border-radius: 4px; padding: 30px 15px 14px;
            cursor: grab; transition: filter 0.2s ease;
            z-index: 10; display: flex; flex-direction: column;
        }

        .sticker:hover { z-index: 20; filter: brightness(1.05) saturate(1.1); }

        .sticker.is-dragging {
            cursor: grabbing; z-index: 100;
            transform: rotate(2deg) scale(1.05) !important;
            filter: brightness(1.08) saturate(1.15);
        }

        .sticker-delete {
            position: absolute; top: 8px; right: 10px;
            background: none; border: none; font-size: 1em;
            cursor: pointer; color: rgba(0,0,0,0.3);
            transition: color 0.2s ease; padding: 2px;
        }

        .sticker-delete:hover { color: rgba(0,0,0,0.65); }

        .sticker-author {
            position: absolute; top: 10px; left: 13px;
            font-size: 0.65em; font-family: 'Caveat', cursive;
            color: rgba(0,0,0,0.45); font-weight: 700;
        }

        .sticker textarea {
            flex: 1; background: transparent; border: none; outline: none;
            font-family: 'Caveat', cursive; font-size: 1.2em;
            color: rgba(0,0,0,0.8); resize: none; width: 100%;
            min-height: 100px; line-height: 1.5; cursor: text; font-weight: 600;
        }

        /* Note modal */
        .note-modal-overlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.6); backdrop-filter: blur(8px);
            z-index: 500; align-items: center; justify-content: center;
        }

        .note-modal-overlay.show { display: flex; animation: fadeIn 0.2s ease; }

        .note-modal {
            background: #0f172a; border: 1px solid rgba(59,130,246,0.2);
            border-radius: 24px; padding: 30px; width: 90%; max-width: 400px;
            box-shadow: 0 25px 60px rgba(0,0,0,0.5);
        }

        body.light .note-modal {
            background: #ffffff; border-color: rgba(100,116,139,0.15);
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
        }

        .note-modal h3 {
            font-size: 1em; color: #ffffff; margin-bottom: 16px;
            text-align: center; letter-spacing: 1px; font-weight: 500;
        }

        body.light .note-modal h3 { color: #334155; }

        .note-modal textarea {
            width: 100%; height: 140px;
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 16px; padding: 16px;
            font-family: 'Caveat', cursive; font-size: 1.3em;
            color: #ffffff; background: rgba(255,255,255,0.03);
            resize: none; outline: none; line-height: 1.5;
        }

        body.light .note-modal textarea {
            border-color: rgba(100,116,139,0.15);
            color: #334155; background: rgba(100,116,139,0.05);
        }

        .note-modal textarea:focus { border-color: rgba(59,130,246,0.4); box-shadow: 0 0 0 3px rgba(59,130,246,0.08); }
        .note-modal textarea::placeholder { color: #334155; }
        body.light .note-modal textarea::placeholder { color: #94a3b8; }

        .note-color-picker { display: flex; gap: 10px; justify-content: center; margin: 16px 0; }

        .color-dot {
            width: 26px; height: 26px; border-radius: 50%;
            cursor: pointer; border: 2px solid transparent;
            transition: all 0.2s ease;
        }

        .color-dot:hover { transform: scale(1.15); }
        .color-dot.selected { border-color: rgba(255,255,255,0.5); transform: scale(1.15); }
        body.light .color-dot.selected { border-color: rgba(0,0,0,0.3); }

        .note-modal-btns { display: flex; gap: 10px; margin-top: 16px; }

        .note-modal-btns button {
            flex: 1; padding: 12px; border-radius: 14px; border: none;
            font-family: 'Poppins', sans-serif; font-size: 0.85em;
            font-weight: 600; cursor: pointer; transition: all 0.3s ease;
        }

        .btn-cancel {
            background: rgba(255,255,255,0.04); color: #475569;
            border: 1px solid rgba(255,255,255,0.06) !important;
        }

        body.light .btn-cancel { background: rgba(100,116,139,0.08); border-color: rgba(100,116,139,0.15) !important; }
        .btn-cancel:hover { background: rgba(255,255,255,0.07); color: #ffffff; }
        body.light .btn-cancel:hover { color: #334155; }

        .btn-post {
            background: rgba(59,130,246,0.15); color: #ffffff;
            border: 1px solid rgba(59,130,246,0.3) !important;
        }

        body.light .btn-post { color: #1e40af; }
        .btn-post:hover { background: rgba(59,130,246,0.25); box-shadow: 0 0 25px rgba(59,130,246,0.4); }

        /* ===================== PHOTOS ===================== */
        .photos-section { display: none; }
        .photos-section.active { display: block; animation: fadeIn 0.4s ease; }

        .photos-upload-area {
            text-align: center;
            margin-bottom: 24px;
        }

        .upload-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 13px 28px;
            background: rgba(59,130,246,0.1);
            color: #ffffff;
            border: 1px solid rgba(59,130,246,0.25);
            border-radius: 50px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        body.light .upload-btn { color: #1e40af; background: rgba(59,130,246,0.08); }

        .upload-btn:hover {
            background: rgba(59,130,246,0.2);
            box-shadow: 0 0 30px rgba(59,130,246,0.4);
            transform: translateY(-2px);
        }

        .upload-btn .plus { font-size: 1.3em; font-weight: 300; }

        #photoFileInput { display: none; }

        .upload-progress {
            display: none;
            margin: 16px auto;
            text-align: center;
        }

        .progress-bar-bg {
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            margin: 8px auto;
            overflow: hidden;
        }

        body.light .progress-bar-bg { background: rgba(100,116,139,0.15); }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #3b82f6, #60a5fa);
            border-radius: 10px;
            transition: width 0.3s ease;
        }

        .progress-text {
            font-size: 0.75em;
            color: #475569;
            font-family: 'Poppins', sans-serif;
        }

        /* Photo Grid */
        .photo-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        @media (max-width: 500px) {
            .photo-grid { grid-template-columns: repeat(2, 1fr); }
        }

        .photo-card {
            position: relative;
            border-radius: 16px;
            overflow: hidden;
            aspect-ratio: 1;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid rgba(255,255,255,0.06);
        }

        body.light .photo-card { border-color: rgba(100,116,139,0.1); }

        .photo-card:hover {

<body>

    <div class="container">
        <div class="header">
            <h1>ours <span>♡</span></h1>
            <p>all the things we wanna do together</p>
            <div class="sync-status" id="syncStatus">
                <span class="dot offline"></span> connecting...
            </div>
        </div>

        <div class="tabs" id="tabs"></div>
        <div id="sections"></div>

        <div class="theme-toggle">
            <span>🌙</span>
            <div class="toggle-switch" onclick="toggleTheme()"></div>
            <span>☀️</span>
        </div>

        <div class="footer">A&A 2026</div>
    </div>

    <div class="toast" id="toast"></div>

    <div class="note-modal-overlay" id="noteModalOverlay">
        <div class="note-modal">
            <h3>leave a note ✦</h3>
            <textarea id="noteTextarea" placeholder="write something sweet..."></textarea>
            <div class="note-color-picker" id="colorPicker"></div>
            <div class="note-modal-btns">
                <button class="btn-cancel" onclick="closeNoteModal()">cancel</button>
                <button class="btn-post" onclick="postNote()">post it ♡</button>

    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()">✕</button>
        <button class="lightbox-nav lightbox-prev" onclick="event.stopPropagation(); navigateLightbox(-1)">‹</button>
        <img id="lightboxImg" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="event.stopPropagation(); navigateLightbox(1)">›</button>
        <div class="lightbox-caption" id="lightboxCaption"></div>
    </div>

    <input type="file" id="photoFileInput" accept="image/*" multiple>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        // ===================== FIREBASE =====================
        const firebaseConfig = {
            apiKey: "AIzaSyCDAmRuuUKsJMjaYyvDBsmETeo4cr11vW8",
            authDomain: "ours-752bf.firebaseapp.com",
            databaseURL: "https://ours-752bf-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "ours-752bf",
            storageBucket: "ours-752bf.firebasestorage.app",
            messagingSenderId: "480212666124",
            appId: "1:480212666124:web:2147a3cc901ff2f1be2b29"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dataRef = db.ref('tracker-data');
        const notesRef = db.ref('sticker-notes');
        const photosRef = db.ref('photos');

        // ===================== CLOUDINARY =====================
        const CLOUD_NAME = 'dskunbsq4';
        const UPLOAD_PRESET = 'dskunbsq4';

        firebase.database().ref('.info/connected').on('value', (snap) => {
            const status = document.getElementById('syncStatus');
            if (snap.val() === true) {
                status.innerHTML = '<span class="dot online"></span> synced ♡';
            } else {
                status.innerHTML = '<span class="dot offline"></span> offline';
            }
        });

        // ===================== THEME =====================
        function toggleTheme() {
            document.body.classList.toggle('light');
            localStorage.setItem('ours-theme', document.body.classList.contains('light') ? 'light' : 'dark');
            rerenderAllStickers();
        }

        const savedTheme = localStorage.getItem('ours-theme');
        if (savedTheme === 'light') document.body.classList.add('light');

        // ===================== CATEGORIES =====================
        const categories = [
            { id: 'places',  name: 'places',     placeholder: 'cafe, city, park...',        emptyEmoji: '🗺️', emptyText: 'no places yet... where should we go?' },
            { id: 'movies',  name: 'movies',      placeholder: 'movie or show name...',      emptyEmoji: '🍿', emptyText: 'nothing here yet... lets pick something!' },
            { id: 'dates',   name: 'date ideas',  placeholder: 'something fun or cute...',   emptyEmoji: '✨', emptyText: 'add our first date idea!' },
            { id: 'todos',   name: 'to do',       placeholder: 'stuff we need to do...',     emptyEmoji: '📝', emptyText: 'nothing to do? thats suspicious' },
            { id: 'books',   name: 'books',       placeholder: 'title or author...',         emptyEmoji: '📖', emptyText: 'empty shelf... lets fix that' },
            { id: 'recipes', name: 'recipes',     placeholder: 'dish name or link...',       emptyEmoji: '👨‍🍳', emptyText: 'no recipes yet... im hungry tho' },
            { id: 'dreams',  name: 'dreams',      placeholder: 'the crazier the better...', emptyEmoji: '💫', emptyText: 'dream big baby... add something' },
            { id: 'games',   name: 'games',       placeholder: 'game name or idea...',       emptyEmoji: '🕹️', emptyText: 'no games yet... what should we play?' },
            { id: 'random',  name: 'random',      placeholder: 'anything else...',           emptyEmoji: '🤷', emptyText: 'this is for the stuff that doesnt fit anywhere' }
        ];

        const noteColors = [
            { bg: '#fde047', shadow: 'rgba(234,179,8,0.6)',   glow: 'rgba(234,179,8,0.35)' },
            { bg: '#f9a8d4', shadow: 'rgba(236,72,153,0.55)', glow: 'rgba(236,72,153,0.3)' },
            { bg: '#93c5fd', shadow: 'rgba(59,130,246,0.55)', glow: 'rgba(59,130,246,0.3)' },
            { bg: '#86efac', shadow: 'rgba(34,197,94,0.55)',  glow: 'rgba(34,197,94,0.3)' },
            { bg: '#c4b5fd', shadow: 'rgba(139,92,246,0.55)', glow: 'rgba(139,92,246,0.3)' },
            { bg: '#fdba74', shadow: 'rgba(249,115,22,0.55)', glow: 'rgba(249,115,22,0.3)' },
        ];

        let selectedColor = 0;

        function buildColorPicker() {
            const picker = document.getElementById('colorPicker');
            noteColors.forEach((c, i) => {
                const dot = document.createElement('div');
                dot.className = 'color-dot' + (i === 0 ? ' selected' : '');
                dot.style.background = c.bg;
                dot.style.boxShadow = `0 3px 10px ${c.shadow}`;
                dot.onclick = () => {
                    document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('selected'));
                    dot.classList.add('selected');
                    selectedColor = i;
                };
                picker.appendChild(dot);
            });
        }

        let localData = {};

        function showToast(msg) {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2000);
        }

        function getDate() {
            const d = new Date();
            const months = ['jan','feb','mar','apr','may','jun','jul','aug','sep','oct','nov','dec'];
            return `${months[d.getMonth()]} ${d.getDate()}`;
        }

        function getLocalSeen() { const s = localStorage.getItem('ours-seen'); return s ? JSON.parse(s) : {}; }
        function saveLocalSeen(seen) { localStorage.setItem('ours-seen', JSON.stringify(seen)); }
        function getNewCount(catId) { const items = localData[catId] || []; const seen = getLocalSeen(); return Math.max(0, items.length - (seen[catId] || 0)); }

        function markAsSeen(catId) {
            const items = localData[catId] || [];
            const seen = getLocalSeen();
            seen[catId] = items.length;
            saveLocalSeen(seen);
            updateTabBadge(catId);
        }

        dataRef.on('value', (snapshot) => {
            localData = snapshot.val() || {};
            renderAll();
            updateAllTabBadges();
        });

        function saveToFirebase() { dataRef.set(localData); }

        // ===================== BUILD UI =====================
        function buildTabs() {
            const tabsEl = document.getElementById('tabs');

            categories.forEach((cat, i) => {
                const btn = document.createElement('button');
                btn.className = 'tab' + (i === 0 ? ' active' : '');
                btn.dataset.cat = cat.id;
                btn.innerHTML = cat.name;
                btn.addEventListener('click', () => switchTab(cat.id));
                tabsEl.appendChild(btn);
            });

            // Photos tab
            const photosBtn = document.createElement('button');
            photosBtn.className = 'tab';
            photosBtn.dataset.cat = 'photos';
            photosBtn.innerHTML = 'photos ✦';
            photosBtn.addEventListener('click', () => switchTab('photos'));
            tabsEl.appendChild(photosBtn);

            // Notes tab
            const notesBtn = document.createElement('button');
            notesBtn.className = 'tab';
            notesBtn.dataset.cat = 'notes';
            notesBtn.innerHTML = 'notes ✦';
            notesBtn.addEventListener('click', () => switchTab('notes'));
            tabsEl.appendChild(notesBtn);
        }

        function buildSections() {
            const sectionsEl = document.getElementById('sections');

            categories.forEach((cat, i) => {
                const section = document.createElement('div');
                section.className = 'category-section' + (i === 0 ? ' active' : '');
                section.id = 'section-' + cat.id;
                section.innerHTML = `
                    <div class="section-header"><h2>${cat.name}</h2></div>
                    <div class="input-row">
                        <input type="text" id="input-${cat.id}" placeholder="${cat.placeholder}">
                        <button class="add-btn" onclick="addItem('${cat.id}')">add +</button>
                    </div>
                    <ul class="items-list" id="list-${cat.id}"></ul>
                    <div class="clear-all"><button onclick="clearAll('${cat.id}')">clear all</button></div>
                `;
                sectionsEl.appendChild(section);
            });

            // Photos section
            const photosSection = document.createElement('div');
            photosSection.className = 'photos-section';
            photosSection.id = 'section-photos';
            photosSection.innerHTML = `
                <div class="section-header"><h2>our photos</h2></div>
                <div class="photos-upload-area">
                    <button class="upload-btn" onclick="document.getElementById('photoFileInput').click()">
                        <span class="plus">+</span> add photo
                    </button>
                    <div class="upload-progress" id="uploadProgress">
                        <div class="progress-bar-bg">
                            <div class="progress-bar-fill" id="progressBarFill"></div>
                        </div>
                        <div class="progress-text" id="progressText">uploading...</div>
                    </div>
                </div>
                <div class="photo-grid" id="photoGrid"></div>
                <div class="photos-empty" id="photosEmpty">
                    <span class="empty-emoji">📷</span>
                    <p>no photos yet...<br>add your first memory together!</p>
                </div>
                <div class="photo-count" id="photoCount"></div>
            `;
            sectionsEl.appendChild(photosSection);

            // Notes section
            const notesSection = document.createElement('div');
            notesSection.className = 'notes-section';
            notesSection.id = 'section-notes';
            notesSection.innerHTML = `
                <div class="section-header"><h2>notes</h2></div>
                <div style="text-align:center; margin-bottom: 20px;">
                    <button class="add-note-btn" onclick="openNoteModal()">
                        <span class="plus">+</span> leave a note
                    </button>
                </div>
                <div class="notes-board" id="notesBoard">
                    <div class="notes-board-hint" id="notesBoardHint">
                        <span class="hint-emoji">💌</span>
                        <p>no notes yet...<br>leave one for each other</p>
                    </div>
                </div>
            `;
            sectionsEl.appendChild(notesSection);

            document.querySelectorAll('.input-row input').forEach(input => {
                input.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') addItem(input.id.replace('input-', ''));
                });
            });
        }

        function switchTab(catId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab[data-cat="${catId}"]`).classList.add('active');
            document.querySelectorAll('.category-section, .notes-section, .photos-section').forEach(s => s.classList.remove('active'));
            document.getElementById('section-' + catId).classList.add('active');
            if (catId !== 'notes' && catId !== 'photos') {
                markAsSeen(catId);
                setTimeout(() => document.getElementById('input-' + catId).focus(), 100);
            }
        }

        function updateTabBadge(catId) {
            const tab = document.querySelector(`.tab[data-cat="${catId}"]`);
            if (!tab) return;
            const cat = categories.find(c => c.id === catId);
            if (!cat) return;
            const newCount = getNewCount(catId);
            const existingBadge = tab.querySelector('.badge');
            if (existingBadge) existingBadge.remove();
            tab.innerHTML = cat.name;
            if (newCount > 0) {
                const badge = document.createElement('span');
                badge.className = 'badge';
                badge.textContent = '+' + newCount;
                tab.appendChild(badge);
            }
        }

        function updateAllTabBadges() { categories.forEach(cat => updateTabBadge(cat.id)); }

        function addItem(catId) {
            const input = document.getElementById('input-' + catId);
            const text = input.value.trim();
            if (!text) return;
            if (!localData[catId]) localData[catId] = [];
            localData[catId].unshift({ text, done: false, date: getDate() });
            const seen = getLocalSeen();
            seen[catId] = localData[catId].length;
            saveLocalSeen(seen);
            saveToFirebase();
            input.value = '';
            showToast('added ♡');
        }

        function toggleItem(catId, index) { localData[catId][index].done = !localData[catId][index].done; saveToFirebase(); }

        function deleteItem(catId, index) {
            localData[catId].splice(index, 1);
            const seen = getLocalSeen();
            if (seen[catId] > localData[catId].length) { seen[catId] = localData[catId].length; saveLocalSeen(seen); }
            saveToFirebase();
            showToast('removed');
        }

        function clearAll(catId) {
            if (!confirm('Clear all items in this category?')) return;
            localData[catId] = [];
            const seen = getLocalSeen();
            seen[catId] = 0;
            saveLocalSeen(seen);
            saveToFirebase();
        }

        function renderList(catId) {
            const items = localData[catId] || [];
            const list = document.getElementById('list-' + catId);
            const cat = categories.find(c => c.id === catId);

            if (items.length === 0) {
                list.innerHTML = `<div class="empty-state"><span class="empty-emoji">${cat.emptyEmoji}</span><p>${cat.emptyText}</p></div>`;
                return;
            }

            list.innerHTML = '';
            items.forEach((item, i) => {
                const li = document.createElement('li');
                li.className = `item ${item.done ? 'done' : ''}`;
                li.draggable = true;
                li.dataset.index = i;
                li.dataset.cat = catId;
                li.innerHTML = `
                    <button class="check-btn ${item.done ? 'checked' : ''}" onclick="toggleItem('${catId}', ${i})">${item.done ? '✓' : ''}</button>
                    <span class="item-text" ondblclick="enableEdit(this, '${catId}', ${i})">${item.text}</span>
                    <span class="item-meta">${item.date}</span>
                    <button class="delete-btn" onclick="deleteItem('${catId}', ${i})">×</button>
                `;
                li.addEventListener('dragstart', handleDragStart);
                li.addEventListener('dragend', handleDragEnd);
                li.addEventListener('dragover', handleDragOver);
                li.addEventListener('drop', handleDrop);
                list.appendChild(li);
            });
        }

        function enableEdit(span, catId, index) {
            const currentText = span.innerText;
            const input = document.createElement('input');
            input.type = 'text';
            input.value = currentText;
            const isLight = document.body.classList.contains('light');
            input.style.cssText = `width:100%;border:none;background:transparent;border-bottom:1px solid #3b82f6;outline:none;font-family:Poppins,sans-serif;font-size:0.9em;color:${isLight ? '#334155' : '#ffffff'};`;
            span.parentNode.replaceChild(input, span);
            input.focus();
            const saveEdit = () => {
                const newText = input.value.trim();
                if (newText && newText !== currentText) { localData[catId][index].text = newText; saveToFirebase(); }
                renderList(catId);
            };
            input.addEventListener('blur', saveEdit);
            input.addEventListener('keypress', (e) => { if (e.key === 'Enter') input.blur(); });
        }

        function renderAll() { categories.forEach(cat => renderList(cat.id)); }

        let draggedItem = null, draggedCatId = null, draggedIndex = null;

        function handleDragStart(e) {
            draggedItem = this; draggedCatId = this.dataset.cat;
            draggedIndex = parseInt(this.dataset.index);
            this.classList.add('dragging'); e.dataTransfer.effectAllowed = 'move';
        }

        function handleDragEnd() { this.classList.remove('dragging'); draggedItem = null; }

        function handleDragOver(e) {
            e.preventDefault();
            const target = e.target.closest('.item');
            if (target && target !== draggedItem && target.dataset.cat === draggedCatId) {
                const list = target.parentNode;
                const children = Array.from(list.children);
                if (draggedIndex < children.indexOf(target)) list.insertBefore(draggedItem, target.nextSibling);
                else list.insertBefore(draggedItem, target);
            }
        }

        function handleDrop(e) {
            e.preventDefault();
            const target = e.target.closest('.item');
            if (!target || target === draggedItem || target.dataset.cat !== draggedCatId) return;
            const items = localData[draggedCatId];
            const [movedItem] = items.splice(draggedIndex, 1);
            const children = Array.from(target.parentNode.children);
            let newIndex = children.indexOf(draggedItem);
            if (draggedIndex < newIndex) newIndex--;
            items.splice(newIndex, 0, movedItem);
            saveToFirebase();
        }

        // ===================== STICKER NOTES =====================
        let allStickers = {};

        function openNoteModal() {
            document.getElementById('noteModalOverlay').classList.add('show');
            document.getElementById('noteTextarea').value = '';
            setTimeout(() => document.getElementById('noteTextarea').focus(), 100);
        }

        function closeNoteModal() { document.getElementById('noteModalOverlay').classList.remove('show'); }

        function postNote() {
            const text = document.getElementById('noteTextarea').value.trim();
            if (!text) return;
            const board = document.getElementById('notesBoard');
            const x = Math.floor(Math.random() * (board.offsetWidth - 200));
            const y = Math.floor(Math.random() * (board.offsetHeight - 180));
            const rotate = (Math.random() * 8 - 4).toFixed(1);
            notesRef.push({ text, color: selectedColor, x, y, rotate, date: getDate(), ts: Date.now() });
            closeNoteModal();
            showToast('note posted ♡');
        }

        function renderSticker(id, note) {
            const board = document.getElementById('notesBoard');
            const existing = document.getElementById('sticker-' + id);
            if (existing) existing.remove();

            const color = noteColors[note.color] || noteColors[0];
            const isLight = document.body.classList.contains('light');
            const el = document.createElement('div');
            el.className = 'sticker';
            el.id = 'sticker-' + id;
            el.style.cssText = `left:${note.x}px;top:${note.y}px;background:${color.bg};box-shadow:4px 6px 25px ${color.shadow}, 0 0 ${isLight ? '15px' : '30px'} ${color.glow};transform:rotate(${note.rotate}deg);border:1px solid rgba(255,255,255,${isLight ? '0.7' : '0.2'});`;
            el.innerHTML = `
                <button class="sticker-delete" onclick="deleteSticker('${id}')">✕</button>
                <span class="sticker-author">${note.date}</span>
                <textarea readonly>${note.text}</textarea>
            `;
            makeStickerDraggable(el, id);
            board.appendChild(el);
            const hint = document.getElementById('notesBoardHint');
            if (hint) hint.style.display = 'none';
        }

        function rerenderAllStickers() {
            Object.keys(allStickers).forEach(id => renderSticker(id, allStickers[id]));
        }

        function makeStickerDraggable(el, id) {
            let startX, startY, startLeft, startTop, isDragging = false;
            el.addEventListener('mousedown', (e) => {
                if (e.target.classList.contains('sticker-delete') || e.target.tagName === 'TEXTAREA') return;
                isDragging = true; startX = e.clientX; startY = e.clientY;
                startLeft = parseInt(el.style.left) || 0; startTop = parseInt(el.style.top) || 0;
                el.classList.add('is-dragging'); e.preventDefault();
            });
            el.addEventListener('touchstart', (e) => {
                if (e.target.classList.contains('sticker-delete') || e.target.tagName === 'TEXTAREA') return;
                isDragging = true; startX = e.touches[0].clientX; startY = e.touches[0].clientY;
                startLeft = parseInt(el.style.left) || 0; startTop = parseInt(el.style.top) || 0;
                el.classList.add('is-dragging');
            }, { passive: true });
            document.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const board = document.getElementById('notesBoard');
                el.style.left = Math.max(0, Math.min(board.offsetWidth - 190, startLeft + e.clientX - startX)) + 'px';
                el.style.top = Math.max(0, Math.min(board.offsetHeight - 170, startTop + e.clientY - startY)) + 'px';
            });
            document.addEventListener('touchmove', (e) => {
                if (!isDragging) return;
                const board = document.getElementById('notesBoard');
                el.style.left = Math.max(0, Math.min(board.offsetWidth - 190, startLeft + e.touches[0].clientX - startX)) + 'px';
                el.style.top = Math.max(0, Math.min(board.offsetHeight - 170, startTop + e.touches[0].clientY - startY)) + 'px';
            }, { passive: true });
            const stopDrag = () => {
                if (!isDragging) return;
                isDragging = false; el.classList.remove('is-dragging');
                notesRef.child(id).update({ x: parseInt(el.style.left), y: parseInt(el.style.top) });
            };
            document.addEventListener('mouseup', stopDrag);
            document.addEventListener('touchend', stopDrag);
        }

        function deleteSticker(id) {
            notesRef.child(id).remove();
            const el = document.getElementById('sticker-' + id);
            if (el) el.remove();
            showToast('note removed');
            const board = document.getElementById('notesBoard');
            if (board && board.querySelectorAll('.sticker').length === 0) {
                const hint = document.getElementById('notesBoardHint');
                if (hint) hint.style.display = 'block';
            }
        }

        notesRef.on('child_added', (snap) => { allStickers[snap.key] = snap.val(); renderSticker(snap.key, snap.val()); });
        notesRef.on('child_removed', (snap) => { delete allStickers[snap.key]; const el = document.getElementById('sticker-' + snap.key); if (el) el.remove(); });

        document.getElementById('noteModalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('noteModalOverlay')) closeNoteModal();
        });

        // ===================== PHOTOS =====================
        let allPhotos = {};

        document.getElementById('photoFileInput').addEventListener('change', async (e) => {
            const files = Array.from(e.target.files);
            if (files.length === 0) return;

            const progress = document.getElementById('uploadProgress');
            const bar = document.getElementById('progressBarFill');
            const text = document.getElementById('progressText');
            progress.style.display = 'block';

            for (let i = 0; i < files.length; i++) {
                text.textContent = `uploading ${i + 1} of ${files.length}...`;
                bar.style.width = `${((i) / files.length) * 100}%`;

                try {
                    const url = await uploadToCloudinary(files[i]);
                    photosRef.push({
                        url: url,
                        caption: '',
                        date: getDate(),
                        ts: Date.now()
                    });
                } catch (err) {
                    console.error('Upload failed:', err);
                    showToast('upload failed :(');
                }
            }

            bar.style.width = '100%';
            text.textContent = 'done ♡';
            setTimeout(() => {
                progress.style.display = 'none';
                bar.style.width = '0%';
            }, 1500);

            showToast(`${files.length} photo${files.length > 1 ? 's' : ''} added ♡`);
            e.target.value = '';
        });

        function uploadToCloudinary(file) {
            return new Promise((resolve, reject) => {
                const formData = new FormData();
                formData.append('file', file);
                formData.append('upload_preset', UPLOAD_PRESET);
                formData.append('folder', 'ours-photos');

                const xhr = new XMLHttpRequest();
                xhr.open('POST', `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`);

                xhr.onload = () => {
                    if (xhr.status === 200) {
                        const res = JSON.parse(xhr.responseText);
                        resolve(res.secure_url);
                    } else {
                        reject(new Error('Upload failed'));
                    }
                };

                xhr.onerror = () => reject(new Error('Upload error'));
                xhr.send(formData);
            });
        }

        function renderPhotos() {
            const grid = document.getElementById('photoGrid');
            const empty = document.getElementById('photosEmpty');
            const count = document.getElementById('photoCount');
            const keys = Object.keys(allPhotos);

            if (keys.length === 0) {
                grid.style.display = 'none';
                empty.style.display = 'block';
                count.textContent = '';
                return;
            }

            empty.style.display = 'none';
            grid.style.display = 'grid';

            // Sort by timestamp newest first
            const sorted = keys.sort((a, b) => (allPhotos[b].ts || 0) - (allPhotos[a].ts || 0));

            grid.innerHTML = '';
            sorted.forEach((id, index) => {
                const photo = allPhotos[id];
                const card = document.createElement('div');
                card.className = 'photo-card';
                card.innerHTML = `
                    <img src="${photo.url}" alt="" loading="lazy">
                    <button class="photo-delete-btn" onclick="event.stopPropagation(); deletePhoto('${id}')">✕</button>
                    <div class="photo-overlay">
                        <span class="photo-overlay-date">${photo.date || ''}</span>
                    </div>
                `;
                card.addEventListener('click', () => openLightbox(index));
                grid.appendChild(card);
            });

            count.textContent = `${keys.length} memory${keys.length !== 1 ? 's' : ''} saved ♡`;
        }

        function deletePhoto(id) {
            if (!confirm('Delete this photo?')) return;
            photosRef.child(id).remove();
            showToast('photo removed');
        }

        // Lightbox
        let lightboxPhotos = [];
        let lightboxIndex = 0;

        function openLightbox(index) {
            const keys = Object.keys(allPhotos).sort((a, b) => (allPhotos[b].ts || 0) - (allPhotos[a].ts || 0));
            lightboxPhotos = keys.map(k => allPhotos[k]);
            lightboxIndex = index;
            updateLightbox();
            document.getElementById('lightbox').classList.add('show');
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('show');
        }

        function navigateLightbox(dir) {
            lightboxIndex = (lightboxIndex + dir + lightboxPhotos.length) % lightboxPhotos.length;
            updateLightbox();
        }

        function updateLightbox() {
            const photo = lightboxPhotos[lightboxIndex];
            document.getElementById('lightboxImg').src = photo.url;
            document.getElementById('lightboxCaption').textContent = photo.caption || photo.date || '';
        }

        document.getElementById('lightbox').addEventListener('click', (e) => {
            if (e.target === document.getElementById('lightbox')) closeLightbox();
        });

        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('show')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        // Firebase listeners for photos
        photosRef.on('value', (snap) => {
            allPhotos = snap.val() || {};
            renderPhotos();
        });

        window.addEventListener('load', () => markAsSeen(categories[0].id));

        // ===================== START =====================
        buildColorPicker();
        buildTabs();
        buildSections();
    </script>
</body>
</html>
